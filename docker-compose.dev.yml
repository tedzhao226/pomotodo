name: pomotodo-dev

services:
  db:
    image: postgres:16.4-alpine
    env_file: .env
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    environment:
      POMOTODO_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POMOTODO_SEED: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:            # default = reach db; proxy = reachable by the Caddy proxy (pomo.dev)
      - default
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true

volumes:
  pgdata_dev:
